[changelog]
header = ""
body = """
{%- set order = ["Features", "Bug fixes", "Refactoring", "Others"] -%}
{%- for group in order -%}
{%- set group_commits = commits | filter(attribute="group", value=group) -%}
{%- if group_commits %}
### {{ group }}
{% for commit in group_commits -%}
- {{ commit.message | split(pat="\n") | first }}
{% endfor %}
{%- endif -%}
{% endfor -%}
"""
footer = ""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
filter_commits = false
sort_commits = "oldest"
commit_parsers = [
  { message = "^README", skip = true },
  { message = "^Update", skip = true },
  { message = "^Version", skip = true },
  { message = "^ci:", skip = true },
  { message = "^docs:", skip = true },
  { message = "Merge pull request", skip = true },
  { message = "Merge branch", skip = true },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug fixes" },
  { message = "^refactor", group = "Refactoring" },
  { message = ".*", group = "Others" },
]
