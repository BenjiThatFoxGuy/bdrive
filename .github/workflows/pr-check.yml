name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-check:
    name: PR Build & Tests
    runs-on: ubuntu-latest
    env:
      PROJECT: teldrive
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Run go generate
        run: go generate ./...

      - name: Download dependencies
        run: go mod download

      - name: Build project
        run: go build ./...

      - name: Run tests (short)
        run: go test ./... -v -count=1 -short

      - name: Ensure UI assets exist
        run: |
          if [ ! -d ui/dist ] || [ -z "$(ls -A ui/dist 2>/dev/null)" ]; then
            echo "ui/dist is missing or empty. Run 'task ui' or add generated assets to ui/dist.";
            exit 1;
          fi
