name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - '**'

permissions:
  contents: read
  packages: write

jobs:
  pr-check:
    name: PR Build & Tests
    runs-on: ubuntu-latest
    env:
      PROJECT: teldrive
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Run go generate
        run: go generate ./...

      - name: Download dependencies
        run: go mod download

      - name: Build project
        run: go build ./...

      - name: Run tests (short)
        run: go test ./... -v -count=1 -short

      - name: Ensure UI assets exist
        id: ui-check
        run: |
          if [ ! -d ui/dist ] || [ -z "$(ls -A ui/dist 2>/dev/null)" ]; then
            echo "ui/dist is missing or empty. Run 'task ui' or add generated assets to ui/dist.";
            exit 1;
          fi

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tag
        run: |
          echo "Determining image tag"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            TAG="nightly"
          else
            TAG="${{ github.ref_name }}"
          fi
          # sanitize tag: replace slashes with dashes
          TAG=${TAG//\//-}
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR (PRs)
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ toLower(github.repository_owner) }}/${{ env.PROJECT }}:${{ steps.tag.outputs.image_tag }}
          platforms: linux/amd64,linux/arm64

