name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - '**'
      - '!main'

permissions:
  contents: read
  packages: write

jobs:
  pr-check:
    name: PR Build & Tests
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Run go generate
        run: go generate ./...

      - name: Download dependencies
        run: go mod download

      - name: Download UI assets
        run: go run scripts/extract.go -url https://github.com/BenjiThatFoxGuy/bdrive-ui/releases/download/latest/teldrive-ui.zip -output ui/dist

      - name: Ensure UI assets exist
        id: ui-check
        run: |
          if [ ! -d ui/dist ] || [ -z "$(ls -A ui/dist 2>/dev/null)" ]; then
            echo "ui/dist is missing or empty. Run 'task ui' or add generated assets to ui/dist.";
            exit 1;
          fi

      - name: Build project
        run: go build ./...

      - name: Run tests (short)
        run: go test $(go list ./... | grep -v '/tests/') -v -count=1 -short

  cross-compile:
    name: Cross-compile (${{ matrix.goarch }})
    if: ${{ github.event_name == 'pull_request' }}
    needs: pr-check
    runs-on: self-hosted
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.goarch }}-${{ hashFiles('**/go.sum') }}

      - name: Run go generate
        run: go generate ./...

      - name: Download dependencies
        run: go mod download

      - name: Download UI assets
        run: go run scripts/extract.go -url https://github.com/BenjiThatFoxGuy/bdrive-ui/releases/download/latest/teldrive-ui.zip -output ui/dist

      - name: Cross-compile binary for Docker image
        run: |
          mkdir -p linux/${{ matrix.goarch }}
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o linux/${{ matrix.goarch }}/teldrive .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: teldrive-linux-${{ matrix.goarch }}
          path: linux/${{ matrix.goarch }}/teldrive

  build-and-push:
    name: Build and push image (PRs)
    if: ${{ github.event_name == 'pull_request' }}
    needs: cross-compile
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize GHCR owner to lowercase and set PROJECT
        run: |
          echo "GHCR_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "PROJECT=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: teldrive-linux-amd64
          path: linux/amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: teldrive-linux-arm64
          path: linux/arm64

      - name: Make binaries executable
        run: chmod +x linux/amd64/teldrive linux/arm64/teldrive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tag
        run: |
          echo "Determining image tag"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            TAG="nightly"
          else
            TAG="${{ github.ref_name }}"
          fi
          # sanitize tag: replace slashes with dashes
          TAG=${TAG//\//-}
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: benjithatfoxguy
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR (PRs)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: goreleaser.dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/${{ env.PROJECT }}:${{ steps.tag.outputs.image_tag }}
          platforms: linux/amd64,linux/arm64
