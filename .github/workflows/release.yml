name: Goreleaser

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:
    types: [opened, synchronize, reopened]

permissions: write-all

jobs:
  cross-compile:
    name: Cross-compile (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.goarch }}-${{ hashFiles('**/go.sum') }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate code and UI assets
        run: |
          task gen
          task ui

      - name: Cross-compile binary for Docker image
        run: |
          mkdir -p linux/${{ matrix.goarch }}
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o linux/${{ matrix.goarch }}/teldrive .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: teldrive-linux-${{ matrix.goarch }}
          path: linux/${{ matrix.goarch }}/teldrive

  build-and-push:
    name: Build and push image
    needs: cross-compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize GHCR owner to lowercase and set PROJECT
        run: |
          echo "GHCR_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "PROJECT=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Install jq
        run: |
          sudo apt-get update && sudo apt-get install -y jq

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: teldrive-linux-amd64
          path: linux/amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: teldrive-linux-arm64
          path: linux/arm64

      - name: Make binaries executable
        run: chmod +x linux/amd64/teldrive linux/arm64/teldrive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tags
        id: tag
        run: |
          IS_RELEASE=false
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            TAG="pr-$(jq -r .number < "$GITHUB_EVENT_PATH")"
          elif [[ "$GITHUB_REF" =~ ^refs/tags/ ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            IS_RELEASE=true
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            TAG="nightly"
          else
            TAG="${GITHUB_REF#refs/heads/}"
          fi
          # sanitize tag (replace slashes with dashes)
          TAG=${TAG//\//-}

          IMAGE="ghcr.io/${GHCR_OWNER}/${PROJECT}"
          IMAGE_TAGS="${IMAGE}:${TAG}"
          if [ "$IS_RELEASE" = true ]; then
            IMAGE_TAGS="$(printf '%s\n%s' "$IMAGE_TAGS" "${IMAGE}:latest")"
          fi
          echo "image_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$IMAGE_TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: benjithatfoxguy
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: goreleaser.dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tag.outputs.image_tags }}

  goreleaser:
    name: Run GoReleaser (on git tag pushes)
    if: "startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
