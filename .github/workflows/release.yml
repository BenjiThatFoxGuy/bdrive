name: Goreleaser

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:
    types: [opened, synchronize, reopened]

permissions: write-all

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize GHCR owner to lowercase and set PROJECT
        run: |
          echo "GHCR_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "PROJECT=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install jq
        run: |
          sudo apt-get update && sudo apt-get install -y jq



      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tag
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            TAG="pr-$(jq -r .number < "$GITHUB_EVENT_PATH")"
          elif [[ "$GITHUB_REF" =~ ^refs/tags/ ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            TAG="nightly"
          else
            TAG="${GITHUB_REF#refs/heads/}"
          fi
          # sanitize tag (replace slashes with dashes)
          TAG=${TAG//\//-}
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: benjithatfoxguy
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate code and UI assets
        if: "! startsWith(github.ref, 'refs/tags/')"
        run: |
          task gen
          task ui

      - name: Cross-compile binaries for Docker image
        if: "! startsWith(github.ref, 'refs/tags/')"
        run: |
          mkdir -p linux/amd64 linux/arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o linux/amd64/teldrive .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o linux/arm64/teldrive .

      - name: Build and push image to GHCR (branches/PRs)
        if: "! startsWith(github.ref, 'refs/tags/')"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: goreleaser.dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/${{ env.PROJECT }}:${{ steps.tag.outputs.image_tag }}

      - name: Run GoReleaser (on git tag pushes)
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
