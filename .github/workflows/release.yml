name: Release

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions: write-all

jobs:
  setup:
    name: Determine build matrix
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
      is_release: ${{ steps.targets.outputs.is_release }}
    steps:
      - name: Determine build matrix
        id: targets
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo 'targets=[{"goos":"linux","goarch":"amd64"},{"goos":"linux","goarch":"arm"},{"goos":"linux","goarch":"arm64"},{"goos":"windows","goarch":"amd64"},{"goos":"windows","goarch":"arm64"},{"goos":"darwin","goarch":"amd64"},{"goos":"darwin","goarch":"arm64"}]' >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo 'targets=[{"goos":"linux","goarch":"amd64"},{"goos":"linux","goarch":"arm64"}]' >> "$GITHUB_OUTPUT"
          fi

  cross-compile:
    name: Cross-compile (${{ matrix.target.goos }}/${{ matrix.target.goarch }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJSON(needs.setup.outputs.targets) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.target.goos }}-${{ matrix.target.goarch }}-${{ hashFiles('**/go.sum') }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate code and UI assets
        run: |
          task gen
          task ui

      - name: Determine version
        id: version
        run: |
          echo "version=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cross-compile binary
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          MODULE=$(go list -m)
          mkdir -p "dist/${GOOS}-${GOARCH}"
          go build -trimpath \
            -ldflags="-s -w -extldflags=-static -X ${MODULE}/internal/version.Version=${{ steps.version.outputs.version }} -X ${MODULE}/internal/version.CommitSHA=${{ steps.version.outputs.commit }}" \
            -o "dist/${GOOS}-${GOARCH}/teldrive${EXT}" .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: dist/${{ matrix.target.goos }}-${{ matrix.target.goarch }}/teldrive*

  build-and-push:
    name: Build and push image
    needs: cross-compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize GHCR owner to lowercase and set PROJECT
        run: |
          echo "GHCR_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "PROJECT=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Install jq
        run: |
          sudo apt-get update && sudo apt-get install -y jq

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-amd64
          path: linux/amd64

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-arm64
          path: linux/arm64

      - name: Make binaries executable
        run: chmod +x linux/amd64/teldrive linux/arm64/teldrive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tags
        id: tag
        run: |
          IS_RELEASE=false
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            TAG="pr-$(jq -r .number < "$GITHUB_EVENT_PATH")"
          elif [[ "$GITHUB_REF" =~ ^refs/tags/ ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            IS_RELEASE=true
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            TAG="nightly"
          else
            TAG="${GITHUB_REF#refs/heads/}"
          fi
          # sanitize tag (replace slashes with dashes)
          TAG=${TAG//\//-}

          IMAGE="ghcr.io/${GHCR_OWNER}/${PROJECT}"
          IMAGE_TAGS="${IMAGE}:${TAG}"
          if [ "$IS_RELEASE" = true ]; then
            IMAGE_TAGS="$(printf '%s\n%s' "$IMAGE_TAGS" "${IMAGE}:latest")"
          fi
          echo "image_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$IMAGE_TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: benjithatfoxguy
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: goreleaser.dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tag.outputs.image_tags }}

  release:
    name: Create GitHub release
    if: needs.setup.outputs.is_release == 'true'
    needs: [setup, cross-compile]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts

      - name: Build archives and checksums
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          WORKSPACE="$(pwd)"
          mkdir -p release
          for dir in artifacts/binary-*; do
            target=$(basename "$dir" | sed 's/^binary-//')
            os="${target%-*}"
            arch="${target##*-}"
            cp README*.md LICENSE "$dir/"
            chmod +x "$dir"/teldrive*
            name="bdrive-${TAG}-${os}-${arch}"
            files=$(cd "$dir" && ls)
            if [ "$os" = "windows" ]; then
              (cd "$dir" && zip -j "${WORKSPACE}/release/${name}.zip" $files)
            else
              tar -czf "release/${name}.tar.gz" -C "$dir" $files
            fi
          done
          (cd release && sha256sum * > bdrive_checksums.txt)

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" --latest --title "$TAG" --notes-file "${{ steps.cliff.outputs.changelog }}" release/*
